version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  model-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "OLLAMA_HOST=http://ollama:11434 ollama pull nomic-embed-text && OLLAMA_HOST=http://ollama:11434 ollama pull deepseek-r1:8b"
    environment:
      OLLAMA_HOST: http://ollama:11434

volumes:
  ollama_data:
