# Agent Content Shield — Configuration
# Customize thresholds, trusted domains, and tool mappings for your setup.

# Severity threshold for active sanitization (1-10)
# Content at or above this level gets stripped/modified
# Below this level, warnings are injected but content passes through
sanitize_threshold: 8

# Severity threshold for hard blocking (memory writes only)
# Memory writes at or above this risk score (0.0-1.0) are blocked
block_threshold: 0.4

# Trusted domains — auto-fetch allowed without confirmation
trusted_domains:
  - github.com
  - docs.microsoft.com
  - learn.microsoft.com
  - developer.mozilla.org
  - anthropic.com
  - stackoverflow.com
  - npmjs.com
  - pypi.org
  - nuget.org
  - crates.io
  - pkg.go.dev
  - rubygems.org

# Known exfiltration endpoints — hard blocked before fetch
blocked_domains:
  - webhook.site
  - requestbin.com
  - pipedream.net
  - hookbin.com
  - requestcatcher.com
  - beeceptor.com
  - mockbin.org
  - postb.in
  - canarytokens.com
  - interact.sh
  - oast.fun
  - oast.me
  - burpcollaborator.net

# Tunneling services — blocked by default
blocked_patterns:
  - "\\bngrok\\b"
  - "\\blocaltunnel\\b"
  - "\\bserveo\\b"
  - "\\blocalhost\\.run\\b"

# Tool classification — map tool name patterns to security categories
# Patterns are regex matched against tool names
tool_mappings:
  # Tools that fetch external content (output gets scanned)
  content_fetch:
    - "WebFetch"
    - ".*web.*fetch.*"
    - ".*browse.*"
    - ".*ctx_fetch.*"

  # Tools that read files (PDF reads get scanned)
  file_read:
    - "Read"
    - ".*file.*read.*"

  # Tools that return external content (output gets scanned)
  external_content:
    - ".*Gmail.*"
    - ".*Google_Calendar.*"
    - ".*slack.*"
    - ".*email.*"

  # Memory/knowledge search tools (output gets scanned)
  knowledge_query:
    - ".*search_knowledge.*"
    - ".*grug.*search.*"
    - ".*grug.*read.*"
    - ".*mem_search.*"
    - ".*query_memory.*"
    - ".*rag.*query.*"
    - ".*retrieve.*"
    - ".*ctx_search.*"

  # Memory write tools (input gets validated before execution)
  memory_write:
    - ".*mem_save.*"
    - ".*mem_update.*"
    - ".*mem_capture.*"
    - ".*grug.*write.*"
    - ".*create_memory.*"
    - ".*update_memory.*"
    - ".*create_document.*"
    - ".*update_document.*"
    - ".*mem0.*add.*"
    - ".*zep.*save.*"
    - ".*persist.*"

  # Code execution tools (network commands get extra scrutiny)
  code_execution:
    - "Bash"
    - ".*exec.*"
    - ".*shell.*"
    - ".*terminal.*"

# Logging
log:
  # Directory for detection logs (relative to shield install, or absolute)
  dir: "logs"
  # Log format: jsonl or json
  format: "jsonl"
  # Max log file size before rotation (bytes)
  max_size: 10485760  # 10MB

# Educational domains — content about attacks is expected, reduce false positives
educational_domains:
  - cybersecurity
  - security
  - pentesting
  - ctf
  - red-team
  - ai-safety
  - adversarial-ml

# Semantic Detection Layer — requires Ollama running locally
# The semantic layer catches attacks that bypass regex (polymorphic paraphrase,
# RLHF exploitation, fabricated authority, pure social engineering)
semantic:
  # Enable/disable the semantic layer
  enabled: true
  # Ollama endpoint
  ollama_url: "http://localhost:11434"
  # Embedding model (must support /api/embed)
  embed_model: "nomic-embed-text"
  # Classifier model (any instruct/chat model)
  classifier_model: "deepseek-r1:8b"
  # Cosine similarity threshold — above this triggers alert
  embed_alert_threshold: 0.78
  # Cosine similarity threshold — above this blocks without LLM
  embed_block_threshold: 0.88
  # LLM confidence threshold — above this = injection
  classifier_threshold: 0.70
  # Maximum time for semantic scan (ms) — fail open if exceeded
  max_latency_ms: 30000
  # Contexts that trigger semantic scan
  # Wave7-Fix: Previously only 3 contexts — 4 others (mcp_external, bash_output,
  # general, pdf_read) got regex-only, allowing synonym-chain attacks to pass
  scan_contexts:
    - web_fetch
    - email
    - knowledge_query
    - mcp_external
    - bash_output
    - general
    - pdf_read

# ── Wave10: Transport-Layer Defenses ───────────────────────────────
# Based on "Your Agent Is Mine" (Liu et al., 2026) — defenses against
# malicious LLM API routers that rewrite tool-call payloads.

# AC-1.a: Package name integrity checking (typosquat detection)
package_integrity:
  enabled: true
  # Maximum Levenshtein distance to flag as typosquat
  max_distance: 2
  # Custom allowlist file (packages that look like typosquats but are legitimate)
  allowlist_file: "config/package-allowlist.json"

# AC-1.b: Response consistency monitoring (session drift detection)
response_consistency:
  enabled: true
  # Minimum responses before drift detection activates
  warm_up: 5
  # CUSUM threshold for drift alert
  drift_threshold: 0.6

# Append-only response hash log (forensic transparency)
response_hash_log:
  enabled: true
  # Max log size before rotation (bytes)
  max_size: 52428800  # 50MB
  # Number of rotated files to keep
  max_rotated: 10

# Router trust scoring
router_trust:
  enabled: true
  # Trust score below which router is auto-blocked
  block_threshold: 0.1
  # Alert when non-first-party router detected
  warn_on_proxy: true

# YOLO mode detection
yolo_detection:
  enabled: true
  # Automatically elevate sensitivity in YOLO mode
  auto_elevate: true
  # Block threshold modifier in YOLO mode (negative = more aggressive)
  severity_modifier: -2

# Provider signature verification (stub — no providers support this yet)
provider_signature:
  enabled: true
  # When true, warn on unsigned responses (once providers support signing)
  warn_unsigned: false
  # When true, block unsigned responses (future — when signing is widespread)
  require_signature: false
